<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#0d1117"/>

  <!-- Clipboard body -->
  <rect x="20" y="30" width="60" height="58" rx="6" fill="#111827"/>
  <rect x="20" y="30" width="60" height="58" rx="6" fill="none" stroke="#93c5fd" stroke-width="2.5" opacity="0.7"/>

  <!-- Clip at top -->
  <rect x="37" y="22" width="26" height="16" rx="5" fill="#111827" stroke="#93c5fd" stroke-width="2" opacity="0.7"/>
  <rect x="43" y="18" width="14" height="9" rx="4.5" fill="#0d1117" stroke="#93c5fd" stroke-width="1.5" opacity="0.7"/>

  <!-- Roster lines -->
  <!-- Row 1 -->
  <circle cx="31" cy="50" r="3" fill="#4ade80" opacity="0.9"/>
  <rect x="39" y="47.5" width="32" height="5" rx="2.5" fill="#93c5fd" opacity="0.55"/>

  <!-- Row 2 -->
  <circle cx="31" cy="63" r="3" fill="#4ade80" opacity="0.9"/>
  <rect x="39" y="60.5" width="24" height="5" rx="2.5" fill="#93c5fd" opacity="0.4"/>

  <!-- Row 3 (partial — in progress) -->
  <circle cx="31" cy="76" r="3" fill="#93c5fd" opacity="0.3"/>
  <rect x="39" y="73.5" width="18" height="5" rx="2.5" fill="#93c5fd" opacity="0.25"/>
</svg>
