<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#1d4ed8"/>
  <!-- Star of life: 3 rectangles at 0°, 60°, 120° forming 6-armed star -->
  <g transform="translate(50,50)">
    <rect x="-8" y="-43" width="16" height="86" rx="8" fill="white"/>
    <rect x="-8" y="-43" width="16" height="86" rx="8" fill="white" transform="rotate(60)"/>
    <rect x="-8" y="-43" width="16" height="86" rx="8" fill="white" transform="rotate(120)"/>
  </g>
  <!-- Rod of Asclepius -->
  <line x1="50" y1="29" x2="50" y2="71" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
  <!-- Snake coils (two curves) -->
  <path d="M47 36 Q42 43 50 50 Q58 57 50 64" stroke="#1d4ed8" fill="none" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Staff finial -->
  <circle cx="50" cy="28" r="3.5" fill="#1d4ed8"/>
</svg>
