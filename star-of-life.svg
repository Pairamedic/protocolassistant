<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#0d1117"/>

  <!-- Star of life (faint teal watermark) -->
  <g transform="translate(50,50)" opacity="0.16">
    <rect x="-8" y="-44" width="16" height="88" rx="8" fill="#5eead4"/>
    <rect x="-8" y="-44" width="16" height="88" rx="8" fill="#5eead4" transform="rotate(60)"/>
    <rect x="-8" y="-44" width="16" height="88" rx="8" fill="#5eead4" transform="rotate(120)"/>
  </g>

  <!-- Syringe rotated 45° — needle points upper-right, plunger lower-left -->
  <g transform="translate(50,50) rotate(45)">

    <!-- Needle (thin, grey) -->
    <rect x="-1.5" y="-44" width="3" height="17" rx="1.5" fill="#94a3b8"/>

    <!-- Needle hub / luer cone (widens from needle to barrel) -->
    <path d="M-2,-27 L2,-27 L10,-21 L-10,-21 Z" fill="#cbd5e1"/>

    <!-- Barrel (white) -->
    <rect x="-10" y="-21" width="20" height="44" rx="4" fill="white"/>

    <!-- Measurement marks (left side of barrel) -->
    <line x1="-10" y1="-10" x2="-5.5" y2="-10" stroke="#cbd5e1" stroke-width="1.3"/>
    <line x1="-10" y1="-1"  x2="-5.5" y2="-1"  stroke="#cbd5e1" stroke-width="1.3"/>
    <line x1="-10" y1="8"   x2="-5.5" y2="8"   stroke="#cbd5e1" stroke-width="1.3"/>
    <line x1="-10" y1="17"  x2="-5.5" y2="17"  stroke="#cbd5e1" stroke-width="1.3"/>

    <!-- Teal liquid fill (lower third of barrel — ready to inject) -->
    <rect x="-8" y="10" width="16" height="12" rx="2.5" fill="#5eead4" opacity="0.92"/>

    <!-- Finger flanges (wings at top of barrel) -->
    <rect x="-16" y="-21" width="6" height="7" rx="3" fill="#e2e8f0"/>
    <rect x="10"  y="-21" width="6" height="7" rx="3" fill="#e2e8f0"/>

    <!-- Plunger rod -->
    <rect x="-3" y="23" width="6" height="13" rx="2" fill="#cbd5e1"/>

    <!-- Thumb ring (T-bar at end of plunger) -->
    <rect x="-12" y="33" width="24" height="7" rx="3.5" fill="#e2e8f0"/>

  </g>
</svg>
