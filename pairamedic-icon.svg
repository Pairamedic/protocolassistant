<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0%" stop-color="#0e1720"/>
      <stop offset="100%" stop-color="#090b0e"/>
    </linearGradient>

    <!-- Star arm gradient: bright top, slightly richer bottom -->
    <linearGradient id="armGrad" x1="256" y1="88" x2="256" y2="424"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6ffce8"/>
      <stop offset="100%" stop-color="#38c9b0"/>
    </linearGradient>

    <!-- Soft outer glow -->
    <filter id="outerGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Tight spike glow -->
    <filter id="spikeGlow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to rounded-square background -->
    <clipPath id="bgClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g clip-path="url(#bgClip)">

    <!-- ── Star of Life glow layer ── -->
    <g opacity="0.38" filter="url(#outerGlow)">
      <rect x="218" y="88" width="76" height="336" rx="15" fill="#5eead4"
            transform="rotate(0   256 256)"/>
      <rect x="218" y="88" width="76" height="336" rx="15" fill="#5eead4"
            transform="rotate(60  256 256)"/>
      <rect x="218" y="88" width="76" height="336" rx="15" fill="#5eead4"
            transform="rotate(120 256 256)"/>
    </g>

    <!-- ── Star of Life arms ── -->
    <rect x="218" y="88" width="76" height="336" rx="15" fill="url(#armGrad)"
          transform="rotate(0   256 256)"/>
    <rect x="218" y="88" width="76" height="336" rx="15" fill="url(#armGrad)"
          transform="rotate(60  256 256)"/>
    <rect x="218" y="88" width="76" height="336" rx="15" fill="url(#armGrad)"
          transform="rotate(120 256 256)"/>

    <!-- ── Heartbeat spike cutting through the center (horizontal) ── -->
    <!-- Glow layer first -->
    <polyline
      points="96,256  168,256  188,240  204,256  214,268  234,152  256,276  278,256  302,222  330,256  416,256"
      fill="none" stroke="white" stroke-width="17"
      stroke-linecap="round" stroke-linejoin="round"
      opacity="0.55" filter="url(#spikeGlow)"/>

    <!-- Main line -->
    <polyline
      points="96,256  168,256  188,240  204,256  214,268  234,152  256,276  278,256  302,222  330,256  416,256"
      fill="none" stroke="white" stroke-width="13"
      stroke-linecap="round" stroke-linejoin="round"
      opacity="0.96"/>

  </g>
</svg>
