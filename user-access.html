<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>User Access Management</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="star-of-life.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Access" />
  <meta name="theme-color" content="#0b0d10" />
  <style>
    :root { --bg:#0b0d10; --card:#141820; --muted:#a7b0be; --text:#e6eef8; --accent:#5eead4; --accent2:#93c5fd; --border:rgba(255,255,255,.1); --input-bg:#0f131a; }
    :root.light { --bg:#f1f5f9; --card:#ffffff; --muted:#64748b; --text:#0f172a; --accent:#0d9488; --accent2:#2563eb; --border:rgba(0,0,0,.1); --input-bg:#f8fafc; }
    *{box-sizing:border-box;transition:background-color .18s,border-color .18s,color .18s}
    html,body{height:100%;margin:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:16px}
    header{position:sticky;top:0;background:linear-gradient(180deg,rgba(20,24,32,.98),rgba(20,24,32,.9));backdrop-filter:saturate(120%) blur(6px);z-index:20;border-bottom:1px solid rgba(255,255,255,.06)}
    :root.light header{background:linear-gradient(180deg,rgba(241,245,249,.98),rgba(241,245,249,.92));border-bottom-color:rgba(0,0,0,.08)}
    .wrap{max-width:720px;margin:0 auto;padding:16px}
    .page-title{font-weight:700;font-size:18px;letter-spacing:.2px}
    .page-subtitle{font-size:13px;color:var(--muted);margin-top:2px}
    .header-row{display:flex;align-items:center;gap:12px}
    .back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 6px;line-height:1;flex:none;-webkit-tap-highlight-color:transparent}
    .back-btn:hover{color:var(--text)}
    .hidden{display:none}
    .section-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
    .card h3{margin:0 0 6px;font-size:16px}
    .fg{display:block;margin-bottom:12px}
    .fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
    .fg input[type="text"],.fg input[type="email"],.fg input[type="password"]{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);outline:none;font-family:inherit;font-size:14px;transition:border-color .15s}
    .fg input:focus{border-color:var(--accent)}
    .btn{padding:11px 16px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);cursor:pointer;font-size:14px;font-family:inherit;font-weight:600;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn.primary{background:rgba(94,234,212,.12);border-color:rgba(94,234,212,.35);color:var(--accent)}
    .btn.danger{border-color:rgba(239,68,68,.5);color:#f87171}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .row{display:flex;gap:10px}
    .row>*{flex:1}
    .info-text{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px}
    .status-msg{font-size:13px;margin-top:8px;padding:8px 12px;border-radius:8px}
    .status-msg.ok{background:rgba(94,234,212,.1);color:var(--accent);border:1px solid rgba(94,234,212,.2)}
    .status-msg.err{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
    /* admin search */
    #admin-search-row{display:flex;gap:8px;margin-bottom:16px}
    #admin-email-input{flex:1;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);outline:none;font-family:inherit;font-size:14px;transition:border-color .15s}
    #admin-email-input:focus{border-color:var(--accent)}
    #admin-search-btn{padding:11px 16px;border-radius:10px;border:1px solid rgba(94,234,212,.35);background:rgba(94,234,212,.12);color:var(--accent);cursor:pointer;font-size:14px;font-family:inherit;font-weight:600;white-space:nowrap;transition:opacity .15s}
    #admin-search-btn:hover{opacity:.85}
    /* auth loading */
    #auth-loading{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:15px;color:var(--muted)}
    #app{display:none;flex-direction:column;min-height:100vh}
  </style>
</head>
<body>
  <div id="auth-loading">Loading…</div>

  <div id="app">
    <header>
      <div class="wrap">
        <div class="header-row">
          <button class="back-btn" id="btn-back" title="Back to Home">‹</button>
          <div>
            <div class="page-title" id="page-title">👤 My Account</div>
            <div class="page-subtitle" id="page-subtitle">Profile &amp; Settings</div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="wrap">

        <!-- Non-admin: Self-profile editing -->
        <div id="view-profile">
          <div class="section-label">Profile</div>
          <div class="card">
            <div class="info-text">Update your display name. These details are stored in your account.</div>
            <div class="fg">
              <label>First Name</label>
              <input type="text" id="profile-first" placeholder="e.g. John" autocomplete="given-name" />
            </div>
            <div class="fg">
              <label>Last Name</label>
              <input type="text" id="profile-last" placeholder="e.g. Smith" autocomplete="family-name" />
            </div>
            <div class="fg">
              <label>Email (read-only)</label>
              <input type="email" id="profile-email" readonly style="opacity:.6;cursor:default" />
            </div>
            <button class="btn primary" id="btn-save-profile" style="width:100%">Save Profile</button>
            <div id="profile-status" style="display:none"></div>
          </div>

          <div class="section-label" style="margin-top:18px">Account</div>
          <div class="card">
            <button class="btn danger" id="btn-signout" style="width:100%">Sign Out</button>
          </div>
        </div>

        <!-- Admin only: User Access Management -->
        <div id="view-admin" class="hidden">
          <div class="section-label">User Access Management</div>
          <div id="admin-search-row">
            <input id="admin-email-input" type="email" placeholder="Search user by email…" autocomplete="off" />
            <button id="admin-search-btn">Look Up</button>
          </div>
          <div id="admin-user-result"></div>

          <div class="section-label" style="margin-top:24px">My Account</div>
          <div class="card">
            <div class="fg">
              <label>First Name</label>
              <input type="text" id="admin-profile-first" placeholder="e.g. John" autocomplete="given-name" />
            </div>
            <div class="fg">
              <label>Last Name</label>
              <input type="text" id="admin-profile-last" placeholder="e.g. Smith" autocomplete="family-name" />
            </div>
            <div class="fg">
              <label>Email (read-only)</label>
              <input type="email" id="admin-profile-email" readonly style="opacity:.6;cursor:default" />
            </div>
            <button class="btn primary" id="btn-save-admin-profile" style="width:100%">Save Profile</button>
            <div id="admin-profile-status" style="display:none"></div>
          </div>

          <div class="card" style="margin-top:8px">
            <button class="btn danger" id="btn-signout-admin" style="width:100%">Sign Out</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAcnp4uXeOgzuzIHpO5UL6Eq9fvhVHFs7Y",
      authDomain: "emsprotocolapp.firebaseapp.com",
      projectId: "emsprotocolapp",
      storageBucket: "emsprotocolapp.firebasestorage.app",
      messagingSenderId: "498482397906",
      appId: "1:498482397906:web:5517abc5d83cf6cf15e30b"
    });

    const fbAuth = firebase.auth();
    const fbDb = firebase.firestore();

    const ADMIN_EMAIL = 'eliasacaldwellnrp@gmail.com';

    const APP_LIST = [
      { id: 'chart',      label: 'CHART — Intervention Logger' },
      { id: 'pearls',     label: 'Pearls — Clinical Reference' },
      { id: 'calculators', label: 'Calculators — EMS Reference' },
      { id: 'narrative',  label: 'Narrative — PCR Builder' },
      { id: 'checkoff',   label: 'Unit Check-Off' },
      { id: 'supervisor', label: 'Supervisor Tools' },
    ];

    // ── Helper: show status message ──
    function showStatus(el, msg, type) {
      el.textContent = msg;
      el.className = 'status-msg ' + type;
      el.style.display = '';
      setTimeout(() => { el.style.display = 'none'; }, 3500);
    }

    // ── Admin: render user access card ──
    function renderUserAccessCard(container, uid, email, currentApps) {
      container.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'card';

      const header = document.createElement('div');
      header.style.cssText = 'font-size:14px;font-weight:600;margin-bottom:6px';
      header.textContent = email;
      card.appendChild(header);

      const note = document.createElement('div');
      note.className = 'info-text';
      note.textContent = 'PAT access is always granted. Toggle additional apps:';
      card.appendChild(note);

      const selected = new Set(currentApps);
      selected.add('pat');

      APP_LIST.forEach(function(appItem) {
        const row = document.createElement('label');
        row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = selected.has(appItem.id);
        cb.style.cssText = 'width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex:none;';
        cb.addEventListener('change', function() {
          if (cb.checked) selected.add(appItem.id);
          else selected.delete(appItem.id);
        });

        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:14px;color:var(--text);';
        lbl.textContent = appItem.label;

        row.appendChild(cb);
        row.appendChild(lbl);
        card.appendChild(row);
      });

      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn primary';
      saveBtn.style.cssText = 'margin-top:14px;width:100%';
      saveBtn.textContent = 'Save Access';
      saveBtn.addEventListener('click', async function() {
        // Admin-only guard: verify current user is admin before writing
        const currentUser = fbAuth.currentUser;
        if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
          alert('Unauthorized: only admins can modify user access.');
          return;
        }
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';
        try {
          await fbDb.collection('users').doc(uid).set(
            { apps: Array.from(selected) },
            { merge: true }
          );
          saveBtn.textContent = 'Saved ✓';
          setTimeout(function() {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Access';
          }, 2000);
        } catch (e) {
          saveBtn.textContent = 'Error — try again';
          saveBtn.disabled = false;
        }
      });
      card.appendChild(saveBtn);
      container.appendChild(card);
    }

    // ── Admin: look up user by email ──
    async function adminLookup(email) {
      // Guard: only admin may look up users
      const currentUser = fbAuth.currentUser;
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
        alert('Unauthorized: only admins can look up users.');
        return;
      }

      const result = document.getElementById('admin-user-result');
      result.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">Searching…</div>';

      try {
        const snap = await fbDb.collection('users').where('email', '==', email.trim().toLowerCase()).limit(1).get();
        if (snap.empty) {
          result.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">No user found with that email. They must sign in at least once first.</div>';
          return;
        }
        const doc = snap.docs[0];
        const data = doc.data();
        const uid = doc.id;
        const currentApps = Array.isArray(data.apps) ? data.apps : ['pat'];
        renderUserAccessCard(result, uid, data.email || email, currentApps);
      } catch (e) {
        result.innerHTML = '<div style="color:#f87171;font-size:13px;padding:8px 0">Error: ' + e.message + '</div>';
      }
    }

    // ── Profile save ──
    async function saveProfile(uid, firstEl, lastEl, statusEl) {
      const firstName = firstEl.value.trim();
      const lastName = lastEl.value.trim();
      const btn = statusEl.previousElementSibling;
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        await fbDb.collection('users').doc(uid).set(
          { firstName, lastName },
          { merge: true }
        );
        showStatus(statusEl, 'Profile saved ✓', 'ok');
        btn.textContent = 'Save Profile';
        btn.disabled = false;
      } catch (e) {
        showStatus(statusEl, 'Error: ' + e.message, 'err');
        btn.textContent = 'Save Profile';
        btn.disabled = false;
      }
    }

    // ── Auth state ──
    fbAuth.onAuthStateChanged(async function(user) {
      if (!user) {
        window.location.replace('index.html?returnTo=user-access.html');
        return;
      }

      const isAdmin = user.email === ADMIN_EMAIL;

      // Load user profile data
      let profileData = {};
      try {
        const doc = await fbDb.collection('users').doc(user.uid).get();
        if (doc.exists) profileData = doc.data();
      } catch (e) {}

      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('app').style.display = 'flex';

      if (isAdmin) {
        // Show admin view
        document.getElementById('page-title').textContent = '🔑 User Access Management';
        document.getElementById('page-subtitle').textContent = 'Admin — manage user app access';
        document.getElementById('view-profile').classList.add('hidden');
        document.getElementById('view-admin').classList.remove('hidden');

        document.getElementById('admin-profile-first').value = profileData.firstName || '';
        document.getElementById('admin-profile-last').value = profileData.lastName || '';
        document.getElementById('admin-profile-email').value = user.email || '';

        document.getElementById('admin-search-btn').addEventListener('click', function() {
          const email = document.getElementById('admin-email-input').value.trim();
          if (!email) return;
          adminLookup(email);
        });
        document.getElementById('admin-email-input').addEventListener('keydown', function(e) {
          if (e.key === 'Enter') document.getElementById('admin-search-btn').click();
        });
        document.getElementById('btn-save-admin-profile').addEventListener('click', function() {
          saveProfile(user.uid,
            document.getElementById('admin-profile-first'),
            document.getElementById('admin-profile-last'),
            document.getElementById('admin-profile-status')
          );
        });
        document.getElementById('btn-signout-admin').addEventListener('click', function() {
          fbAuth.signOut();
        });

      } else {
        // Show non-admin self-profile view
        document.getElementById('profile-first').value = profileData.firstName || '';
        document.getElementById('profile-last').value = profileData.lastName || '';
        document.getElementById('profile-email').value = user.email || '';

        document.getElementById('btn-save-profile').addEventListener('click', function() {
          saveProfile(user.uid,
            document.getElementById('profile-first'),
            document.getElementById('profile-last'),
            document.getElementById('profile-status')
          );
        });
        document.getElementById('btn-signout').addEventListener('click', function() {
          fbAuth.signOut();
        });
      }
    });

    document.getElementById('btn-back').addEventListener('click', function() {
      window.location.href = 'dashboard.html';
    });
  </script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});</script>
</body>
</html>
