<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Pairamedic</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pairamedic" />
  <link rel="apple-touch-icon" href="star-of-life.svg" />
  <style>
    :root { --bg:#0b0d10; --card:#141820; --muted:#a7b0be; --text:#e6eef8; --accent:#5eead4; --accent2:#93c5fd; --border:rgba(255,255,255,.1); --input-bg:#0f131a; }
    :root.light { --bg:#f1f5f9; --card:#ffffff; --muted:#64748b; --text:#0f172a; --accent:#0d9488; --accent2:#2563eb; --border:rgba(0,0,0,.1); --input-bg:#f8fafc; }
    *{box-sizing:border-box;transition:background-color .18s,border-color .18s,color .18s}
    html,body{height:100%}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:16px}
    .wrap{max-width:760px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;text-align:center}
    h1{margin:0 0 10px;font-size:24px}
    p{margin:0 0 14px;color:var(--muted);line-height:1.6}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);cursor:pointer;font-size:15px;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Restoring Protocol Assistant…</h1>
      <p>You are being redirected to the last known-good Protocol Assistant build while the full repair is completed.</p>
      <p>If you are not redirected automatically, use the button below.</p>
      <a class="btn" href="app-docs/backup/ProtocolAssistant.html">Open restored Protocol Assistant</a>
    </div>
  </div>
  <script>
    window.location.replace('app-docs/backup/ProtocolAssistant.html');
  </script>
</body>
</html>
