<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b0d10"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Glow layer -->
  <polyline
    points="36,272 128,272 152,244 174,272 196,290 220,100 244,308 268,272 298,214 345,272 476,272"
    fill="none" stroke="#5eead4" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.35" filter="url(#glow)"/>

  <!-- Main EKG line -->
  <polyline
    points="36,272 128,272 152,244 174,272 196,290 220,100 244,308 268,272 298,214 345,272 476,272"
    fill="none" stroke="#5eead4" stroke-width="18"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Heart at R-wave peak -->
  <path d="M220,96 C220,96 206,80 206,68 C206,58 213,52 220,60 C227,52 234,58 234,68 C234,80 220,96 220,96 Z"
    fill="#ffffff" opacity="0.95"/>
</svg>
